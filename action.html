{% extends "base.html" %}
{% block title %}{{ action }}{% endblock %}
{% block content %}
<div class="card" style="max-width:440px;margin:auto;">
  <div class="card-title">{{ icon }} {{ action }}</div>
  <p style="color:#6b7280;font-size:.9rem;margin-bottom:1rem;">Current Balance: <strong>₹{{ "%.2f"|format(acc.balance) }}</strong></p>
  <form method="POST">
    <label>Amount (₹)</label>
    <input type="number" name="amount" placeholder="Enter amount" min="1" step="0.01" required>
    <div style="display:flex;gap:.8rem;margin-top:1.2rem;">
      <button type="submit" class="btn btn-primary" style="flex:1;">Confirm {{ action }}</button>
      <a href="{{ url_for('dashboard') }}" class="btn btn-sm" style="flex:1;text-align:center;background:#f1f4f9;color:#0f1b35;line-height:2.2;">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
